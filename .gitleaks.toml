# gitleaks config — needed ONLY for the working-tree leg of `make secrets`.
#
# WHY THERE IS A WORKING-TREE LEG AT ALL
# `gitleaks detect` scans git HISTORY, not the working tree. So `make secrets` could not catch a
# secret you were ABOUT TO COMMIT — only one already committed, at which point the secret must be
# rotated, which is the exact failure a pre-commit gate exists to prevent. (In CI it worked by
# accident: actions/checkout is shallow, so the root commit is diffed against the empty tree and
# the whole worktree gets scanned as additions. `fetch-depth: 0` would have silently removed that.)
#
# The second leg (`--no-git`) scans the files on disk. It needs this allowlist, because on any real
# operator's box it otherwise reports the LOCAL RUNTIME ARTIFACTS below — proven: 5 findings, all of
# them private keys in gitignored paths — and a gate that is red on every dev box gets ignored,
# which is worse than no gate.
[extend]
useDefault = true

[allowlist]
description = """
Gitignored, operator-local runtime artifacts. These are GENERATED by the flow (self-signed Harbor
CA/leaf keys, kubeconfigs) and are git-ignored, so they cannot reach a commit — the history leg
therefore loses no coverage by skipping them here.

This allowlist would, however, hide a DELIBERATE `git add -f`. That hole is closed mechanically, not
by trust: `make check-secrets-untracked` fails if any of these paths is ever tracked by git.
"""
paths = [
  '''^secrets/''',      # self-signed Harbor CA + leaf keys, kubeconfigs (06-install-harbor.sh, 05-kind-up.sh)
  '''^\.jumpbox/''',    # the jump-box harness's scratch kubeconfig
  '''^\.env$''',        # the operator's own overrides (gitignored; .env.example is the committed one)
  '''^\.env\.state''',  # the discovered-state overlay (LB IPs, generated passwords)
  '''^bundle/''',       # the sneakernet image bundle (OCI layouts; binary blobs, not source)
]
