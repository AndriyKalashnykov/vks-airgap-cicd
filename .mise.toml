# Jump-box developer/operator toolchain (portfolio version-manager policy: mise).
#
# Scope: tools mise installs cleanly across Ubuntu + PhotonOS on the INTERNET side.
# Air-gap exception: the air-gapped host cannot reach mise's download sources, so
# scripts/00-install-prereqs.sh installs the same binaries from OS packages /
# the transferred bundle there. `tkn` and `argocd` are handled by
# 00-install-prereqs.sh (OS package or pinned GitHub-release download) rather than
# mise, because they are not reliably available across both distros via mise.
#
# Run `mise install` on the jump box before running the Makefile.

[tools]
java     = "temurin-25"
maven    = "3.9"
kubectl  = "1.36.2"
helm     = "4.2.2"
kustomize = "5.8.1"
jq       = "1.8.2"
yq       = "4"
# crane (google/go-containerregistry) — the image-mirror engine. Replaces skopeo, which
# ships no static binary and isn't packaged on Photon OS 5; crane ships static amd64/arm64
# binaries, so it installs cross-distro via mise on the jump box.
crane    = "0.21.7"
# node is only for `make renovate-validate` (renovate requires node ^24.11).
node     = "24"
# Security-scan gates (make sec / static-check) — internet/CI side only, never
# needed for the air-gap install flow. Provided cross-distro via mise so local
# `make static-check` mirrors the CI static-check job (which runs mise-action).
trivy    = "0.72.0"
gitleaks = "8.30.1"

[settings]
# Reproducible: never auto-bump; pin via this file + Renovate.
experimental = true
