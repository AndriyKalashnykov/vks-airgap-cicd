# Jump-box developer/operator toolchain (portfolio version-manager policy: mise).
#
# Scope: tools mise installs cleanly across Ubuntu + PhotonOS on the INTERNET side.
# Air-gap exception: the air-gapped host cannot reach mise's download sources, so
# scripts/00-install-prereqs.sh installs the same binaries from OS packages /
# the transferred bundle there. `tkn` and `argocd` are handled by
# 00-install-prereqs.sh (OS package or pinned GitHub-release download) rather than
# mise, because they are not reliably available across both distros via mise.
#
# Run `mise install` on the jump box before running the Makefile.

[tools]
java     = "temurin-25.0.3+9.0.LTS"
maven    = "3.9"
kubectl  = "1.36.2"
helm     = "4.2.3"
kustomize = "5.8.1"
# kind — the local KinD stand-in cluster (scripts/05-kind-up.sh `require_cmd kind`).
# It USED to be installed by nothing at all: the README promised `make deps  # kind, ...`
# while neither this file nor 00-install-prereqs.sh provided it, so `make e2e-kind` — the
# repo's flagship "just see it work" path — died at step one on any box that did not happen
# to already have kind (the CI smoke curled its own copy to work around it). Pinning it here
# makes `make deps` deliver what the docs claim, and single-sources the version (CI's
# mise-action reads this file) so it cannot drift from a second pin in a workflow.
kind     = "0.32.0"
jq       = "1.8.2"
yq       = "4"
# crane (google/go-containerregistry) — the image-mirror engine. Replaces skopeo, which
# ships no static binary and isn't packaged on Photon OS 5; crane ships static amd64/arm64
# binaries, so it installs cross-distro via mise on the jump box.
crane    = "0.21.7"
# node is only for `make renovate-validate` (renovate requires node ^24.11).
node     = "24"
# go — the gowebapp toolchain. Without it, CI (which gets its toolchain from THIS file via
# mise-action) has no `go`, so `make app-test` / `make trivy-fs` cannot test or scan the Go app at
# all — it would pass locally (dev boxes have Go) and fail on a clean runner. Same hidden-local-state
# class as `kind` being installed by nothing.
# KEEP ALIGNED with the golang image in images/images.txt and the ARG in apps/go/gowebapp/Dockerfile
# (check-toolchain-alignment gates it): the pipeline builds with that image, so a local/CI toolchain
# on a different minor would test something the pipeline never builds.
go       = "1.26.5"
# Security-scan gates (make sec / static-check) — internet/CI side only, never
# needed for the air-gap install flow. Provided cross-distro via mise so local
# `make static-check` mirrors the CI static-check job (which runs mise-action).
trivy    = "0.72.0"
gitleaks = "8.30.1"
# shellcheck — the lint gate's shell linter. Pinned via mise (not the OS package)
# so local `make lint` uses the SAME version as CI; an unpinned system shellcheck
# drifts (e.g. an older runner-bundled build flags SC2015 that a newer local one
# does not), producing green-locally / red-in-CI surprises.
shellcheck = "0.11.0"
# The rest of the quality gate: `make validate` (kubeconform), `make lint`
# (yamllint + hadolint). These USED to be curl'd + `pipx install`ed by a bespoke
# CI step on EVERY static-check run (~25 s of billed runner time, no cache) —
# because "mise doesn't have them" was assumed, never checked. It does:
#   kubeconform -> aqua:yannh/kubeconform     hadolint -> aqua:hadolint/hadolint
#   yamllint    -> pipx:yamllint  (mise drives it through the pinned `uv` below)
# Pinning them here deletes that step, puts them in mise-action's cache, AND —
# the real win — makes local `make lint`/`make validate` use the same versions as
# CI. yamllint in particular was installed UNPINNED (`pipx install yamllint`), so
# CI floated to whatever was newest while every dev box had something else: the
# exact green-local/red-CI drift the shellcheck comment above warns about.
kubeconform = "0.8.0"
hadolint    = "2.14.0"
yamllint    = "1.38.0"
# uv — NOT a project tool: it is what mise's `pipx:` backend shells out to in order
# to install yamllint. Without it on PATH mise errors `pipx may be required but was
# not found` (verified). Pinning it here means the yamllint install does not depend
# on whatever pipx/python the runner (or the operator's box) happens to ship.
uv       = "0.11.30"

[settings]
# Reproducible: never auto-bump; pin via this file + Renovate.
experimental = true
