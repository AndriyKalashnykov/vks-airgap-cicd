# Air-gapped VKS CI/CD demo web UI configuration.
# Every operator-tunable value is externalized via Spring's ${VAR:default}
# placeholder syntax (ONE colon). Defaults mirror the repo-root .env.example.
server:
  # BLOCKING: port MUST be externalized. Do not hardcode.
  port: ${APP_INTERNAL_PORT:8080}

spring:
  application:
    name: ${APP_NAME:webui}
  # `default` profile = human-readable console logs (see logback-spring.xml).
  # Activate the `json` profile (SPRING_PROFILES_ACTIVE=json) for structured logs.
  thymeleaf:
    cache: true

app:
  # The demo "deploy me" value — change this and redeploy to see the UI update.
  message: ${APP_MESSAGE:Hello from vks-cicd}

info:
  app:
    # Baked in at build time from the Maven project version (@...@ delimiters are
    # filtered by spring-boot-starter-parent). Overridable at runtime by env.
    version: ${APP_VERSION:@project.version@}
    # Commit is supplied by the build/CI (env or JVM arg); "unknown" when absent.
    commit: ${APP_COMMIT:unknown}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
      show-details: always
      group:
        liveness:
          include: livenessState
        readiness:
          include: readinessState
---
# Structured (JSON) logging profile — activate with SPRING_PROFILES_ACTIVE=json
# (the profile used in-cluster). Uses Spring Boot 3.4's native structured
# logging (ECS layout) — no extra dependency, no logback-spring.xml needed.
# The default profile keeps human-readable console logs for local dev.
spring:
  config:
    activate:
      on-profile: json
logging:
  structured:
    format:
      console: ecs
