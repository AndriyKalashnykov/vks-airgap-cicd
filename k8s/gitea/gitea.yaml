---
apiVersion: v1
kind: Namespace
metadata:
  name: ${GITEA_NAMESPACE}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: gitea-data
  namespace: ${GITEA_NAMESPACE}
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: ${GITEA_STORAGE_SIZE}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gitea
  namespace: ${GITEA_NAMESPACE}
  labels:
    app.kubernetes.io/name: gitea
spec:
  replicas: 1
  strategy:
    type: Recreate            # single RWO volume — never two pods at once
  selector:
    matchLabels:
      app.kubernetes.io/name: gitea
  template:
    metadata:
      labels:
        app.kubernetes.io/name: gitea
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: gitea
          # Tag tracked by the general k8s/tekton manifest customManager in
          # renovate.json; the check-image-alignment gate keeps it in lockstep
          # with images/images.txt (the mirror source of truth).
          image: ${HARBOR_URL}/${HARBOR_INFRA_PROJECT}/gitea/gitea:1.26.4-rootless
          imagePullPolicy: IfNotPresent
          env:
            - { name: GITEA__database__DB_TYPE, value: "sqlite3" }
            - { name: GITEA__database__PATH,    value: "/var/lib/gitea/data/gitea.db" }
            - { name: GITEA__server__HTTP_PORT, value: "3000" }
            - { name: GITEA__server__ROOT_URL,  value: "${GITEA_URL}/" }
            - { name: GITEA__security__INSTALL_LOCK, value: "true" }
            - { name: GITEA__service__DISABLE_REGISTRATION, value: "true" }
            # Allow webhooks to the in-cluster EventListener (Gitea blocks
            # private/loopback targets by default — this is the key air-gap gotcha).
            - { name: GITEA__webhook__ALLOWED_HOST_LIST, value: "*" }
          ports:
            - { name: http, containerPort: 3000 }
            - { name: ssh,  containerPort: 2222 }
          readinessProbe:
            httpGet: { path: /api/healthz, port: http }
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet: { path: /api/healthz, port: http }
            initialDelaySeconds: 30
            periodSeconds: 15
          resources:
            requests: { cpu: "100m", memory: "256Mi" }
            limits:   { cpu: "1",    memory: "1Gi" }
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - { name: data, mountPath: /var/lib/gitea }
            - { name: config, mountPath: /etc/gitea }
            - { name: tmp, mountPath: /tmp }
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: gitea-data
        - name: config
          emptyDir: {}
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: gitea-http
  namespace: ${GITEA_NAMESPACE}
  labels:
    app.kubernetes.io/name: gitea
spec:
  # LoadBalancer, NOT ClusterIP — and for the same reason Harbor and ArgoCD each keep their own
  # direct LB: a MACHINE outside this cluster has to reach Gitea, and the ingress cannot serve one.
  #
  # ArgoCD is a VCF Supervisor Service: its repo-server runs in a DIFFERENT cluster and must clone
  # <app>-deploy. It cannot use the in-cluster DNS name (gitea-http.gitea.svc — that resolves only
  # inside THIS cluster), and it cannot use the ingress either: every route matches the hostname
  # `gitea.vks.local`, which exists solely in the operator's /etc/hosts. A repo-server has no
  # /etc/hosts entry to give, and dialling the ingress LB IP directly sends `Host: <ip>`, which
  # matches no vhost -> 404 from a live listener, not a clone. (Nor can the IP be added as a
  # Gateway-API hostname: the spec forbids IP literals.)
  #
  # A LoadBalancer Service keeps its ClusterIP too, so the in-cluster consumers (Tekton clone +
  # tag write-back) are unaffected and still use GITEA_INTERNAL_URL.
  type: ${GITEA_SERVICE_TYPE}
  selector:
    app.kubernetes.io/name: gitea
  ports:
    - { name: http, port: 3000, targetPort: http }
