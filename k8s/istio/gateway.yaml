# Istio Gateway binding the ingress-gateway workload on :80 for the *.vks.local UIs.
#
# Applied ONLY when we own a Gateway:
#   - INGRESS_CONTROLLER=istio           (we installed the mesh), or
#   - INGRESS_CONTROLLER=istio-existing  with ISTIO_SHARED_GATEWAY unset (the mesh is
#     the platform team's, but we are allowed to create our own Gateway in its namespace).
# When ISTIO_SHARED_GATEWAY=<ns>/<name> is set we create NO Gateway and reuse theirs.
#
# ${ISTIO_GATEWAY_LABEL} is DISCOVERED, never assumed. The istio/gateway helm chart
# derives the gateway workload's `istio:` label from the HELM RELEASE NAME, so a mesh
# someone else installed will very likely NOT be labelled `istio: ingressgateway`.
# A Gateway whose selector matches no workload is accepted by the API server WITHOUT
# error and simply binds nothing — Envoy never gets a :80 listener, so the symptom is
# a bare connection-refused, not a 404. (Proven on KinD; see docs/decisions/istio-on-vks.md.)
#
# ${VAR} tokens are rendered by scripts/lib/istio.sh (restricted envsubst allowlist).
apiVersion: networking.istio.io/v1
kind: Gateway
metadata:
  name: ${ISTIO_GATEWAY_NAME}
  namespace: ${ISTIO_GATEWAY_NAMESPACE}
spec:
  selector:
    istio: ${ISTIO_GATEWAY_LABEL}
  servers:
    - port:
        number: 80
        name: http
        protocol: HTTP
      hosts:
        - ${GITEA_HOST}
        - ${JAVAWEBAPP_HOST}
        - ${TEKTON_DASHBOARD_HOST}
