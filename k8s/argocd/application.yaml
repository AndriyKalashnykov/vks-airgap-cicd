apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ${APP_NAME}
  namespace: ${ARGOCD_NAMESPACE}
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  # `default` permits every destination and repo — right for KinD and for the operator who INSTALLED
  # ArgoCD. A TENANT is given their own AppProject, and an Application whose project does not permit
  # its destination/repo is REJECTED. So this is a variable, not a literal.
  project: ${ARGOCD_PROJECT}
  source:
    # The Gitea URL ARGOCD'S repo-server can clone (GITEA_ARGOCD_URL — Gitea's LoadBalancer when
    # ArgoCD is off-cluster; the in-cluster Service DNS when it is not). NOT the ingress hostname:
    # that resolves only in the operator's /etc/hosts. Kustomize app at root.
    repoURL: ${DEPLOY_REPO_CLONE_URL}
    targetRevision: ${ARGOCD_TRACK_BRANCH}
    path: .
  destination:
    # In-cluster by default (KinD / ArgoCD-in-guest). On a real lab where ArgoCD runs on the
    # Supervisor, `make argocd-register-guest` registers the guest cluster and sets
    # ARGOCD_DEST_SERVER to its API URL so ArgoCD deploys THERE, not on the Supervisor.
    server: ${ARGOCD_DEST_SERVER}
    namespace: ${APP_NAMESPACE}
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
