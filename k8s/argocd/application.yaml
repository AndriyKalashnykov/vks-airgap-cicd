apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ${APP_NAME}
  namespace: ${ARGOCD_NAMESPACE}
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  # `default` permits every destination and repo — right for KinD and for the operator who INSTALLED
  # ArgoCD. A TENANT is given their own AppProject, and an Application whose project does not permit
  # its destination/repo is REJECTED. So this is a variable, not a literal.
  project: ${ARGOCD_PROJECT}
  source:
    # The Gitea URL ARGOCD'S repo-server can clone (GITEA_ARGOCD_URL — Gitea's LoadBalancer when
    # ArgoCD is off-cluster; the in-cluster Service DNS when it is not). NOT the ingress hostname:
    # that resolves only in the operator's /etc/hosts. Kustomize app at root.
    repoURL: ${DEPLOY_REPO_CLONE_URL}
    targetRevision: ${ARGOCD_TRACK_BRANCH}
    path: .
  destination:
    # Rendered as EITHER `server: <api-url>` OR `name: <registered cluster name>` — ArgoCD accepts
    # both, and a TENANT often has only the name: the cluster Secrets live in the ArgoCD admin's
    # namespace, which they may not list. In-cluster by default (KinD / ArgoCD-in-guest); on a real
    # lab the guest must be a REGISTERED destination or ArgoCD would deploy onto the Supervisor.
    ${ARGOCD_DEST_KEY}: ${ARGOCD_DEST_VALUE}
    namespace: ${APP_NAMESPACE}
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
