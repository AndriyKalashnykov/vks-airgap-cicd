apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: ${APP_NAME}-ci
  namespace: ${CI_NAMESPACE}
spec:
  description: >-
    On a push to ${APP_NAME}-app: clone -> test -> build+push image to Harbor ->
    write the new tag back to ${APP_NAME}-deploy (which ArgoCD then syncs).
    ONE template, rendered per app from apps/registry.tsv — only the name and the TEST task
    differ (maven-test for Java, go-test for Go), so the walk is provably identical.
  params:
    - name: app-repo-url
      type: string
    - name: app-revision
      type: string
      default: main
    - name: deploy-repo-url
      type: string
    - name: deploy-revision
      type: string
      default: main
    - name: image
      type: string
      description: App image without tag (e.g. harbor/apps/<app>).
    - name: builder-image
      type: string
    - name: runtime-image
      type: string
    - name: registry
      type: string
    - name: insecure-registry
      type: string
      default: "false"
  workspaces:
    - name: shared-data
    - name: dockerconfig
    - name: ca
      optional: true
  tasks:
    - name: clone-app
      taskRef: { name: git-clone }
      params:
        - { name: url, value: $(params.app-repo-url) }
        - { name: revision, value: $(params.app-revision) }
        - { name: subdir, value: app }
      workspaces:
        - { name: output, workspace: shared-data }

    - name: test
      runAfter: [clone-app]
      # Block style (not the flow `{ name: ... }` the other taskRefs use): a `${VAR}` token inside a
      # YAML FLOW mapping is a syntax error (the `{` of `${` opens a nested flow map), so yamllint
      # and kubeconform cannot parse the template at all.
      taskRef:
        name: ${APP_TEST_TASK}
      params:
        - { name: subdir, value: app }
        - { name: builder-image, value: $(params.builder-image) }
      workspaces:
        - { name: source, workspace: shared-data }

    - name: build
      runAfter: [test]
      taskRef: { name: kaniko-build }
      params:
        - { name: subdir, value: app }
        - { name: image, value: $(params.image) }
        - { name: tag, value: $(tasks.clone-app.results.commit) }
        - { name: builder-image, value: $(params.builder-image) }
        - { name: runtime-image, value: $(params.runtime-image) }
        - { name: registry, value: $(params.registry) }
        - { name: insecure, value: $(params.insecure-registry) }
      workspaces:
        - { name: source, workspace: shared-data }
        - { name: dockerconfig, workspace: dockerconfig }
        - { name: ca, workspace: ca }

    - name: deploy-update
      runAfter: [build]
      taskRef: { name: update-deploy }
      params:
        - { name: deploy-url, value: $(params.deploy-repo-url) }
        - { name: deploy-revision, value: $(params.deploy-revision) }
        - { name: tag, value: $(tasks.clone-app.results.commit) }
        # Block style: a `${VAR}` inside a YAML flow mapping is a syntax error (see the taskRef above).
        - name: app
          value: ${APP_NAME}
      workspaces:
        - { name: scratch, workspace: shared-data }
