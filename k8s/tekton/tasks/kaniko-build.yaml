apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: kaniko-build
  namespace: ${CI_NAMESPACE}
spec:
  description: >-
    Build the app image with Kaniko (no docker daemon) and push it to Harbor.
    App- and LANGUAGE-agnostic: anything a specific language's Dockerfile needs beyond the
    builder/runtime images arrives as the build-args param (scripts/lib/apps.sh app_build_args).
    Trusts the self-signed Harbor CA from the optional ca workspace, or skips TLS when
    insecure=true.
  params:
    - name: subdir
      type: string
      default: repo
    - name: image
      type: string
      description: Destination image WITHOUT tag, e.g. <harbor>/<project>/<app>
    - name: tag
      type: string
      description: Image tag (typically the app commit SHA)
    - name: builder-image
      type: string
    - name: runtime-image
      type: string
      description: Harbor-mirrored runtime base (air-gap; no docker.io pull).
    - name: build-args
      type: string
      default: ""
      description: >-
        Space-separated extra --build-arg flags this app's Dockerfile needs, supplied by
        scripts/lib/apps.sh app_build_args() — the ONE place that knows what a given language
        requires. Empty when it needs none. No flag may contain whitespace: the value is
        word-split into individual kaniko arguments.
    - name: registry
      type: string
      description: Harbor host, for --registry-certificate
    - name: insecure
      type: string
      default: "false"
  workspaces:
    - name: source
    - name: dockerconfig
      description: Holds config.json with Harbor push credentials.
    - name: ca
      optional: true
      description: Optional; ca.crt is the Harbor CA for TLS trust.
  results:
    - name: image-digest
      description: The digest of the pushed image.
  steps:
    - name: build-and-push
      image: ${HARBOR_URL}/${HARBOR_INFRA_PROJECT}/kaniko-project/executor:v1.24.0-debug
      env:
        - name: DOCKER_CONFIG
          value: $(workspaces.dockerconfig.path)
      script: |
        #!/busybox/sh
        set -e
        set -- \
          "--context=dir://$(workspaces.source.path)/$(params.subdir)" \
          "--dockerfile=Dockerfile" \
          "--destination=$(params.image):$(params.tag)" \
          "--build-arg=BUILDER_IMAGE=$(params.builder-image)" \
          "--build-arg=RUNTIME_IMAGE=$(params.runtime-image)" \
          "--digest-file=$(results.image-digest.path)" \
          "--ignore-path=/product_uuid"
        # /product_uuid is a kubelet-mounted file; kaniko's between-stage filesystem
        # delete can't unlink it ("device or resource busy") -> ignore it.
        #
        # The app's LANGUAGE-specific build args (app_build_args in scripts/lib/apps.sh).
        # UNQUOTED on purpose: the param is a space-separated flag list that must word-split into
        # separate kaniko arguments, and it is EMPTY when the app needs none (adding nothing).
        # This task itself knows no language.
        set -- "$@" $(params.build-args)
        # Trust the Harbor CA when the ca workspace supplies one.
        if [ -f "$(workspaces.ca.path)/ca.crt" ]; then
          set -- "$@" "--registry-certificate=$(params.registry)=$(workspaces.ca.path)/ca.crt"
        fi
        if [ "$(params.insecure)" = "true" ]; then
          set -- "$@" "--insecure" "--skip-tls-verify"
        fi
        echo "kaniko $*"
        exec /kaniko/executor "$@"
