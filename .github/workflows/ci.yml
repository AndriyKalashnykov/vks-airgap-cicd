name: CI

# Offline-verifiable gates for the air-gapped VKS CI/CD demo.
# Flow: changes → (static-check, docs-lint) → ci-pass (single required check).
on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
  workflow_dispatch:
  # A weekly full run over main, and it is NOT redundant with the push runs. It is the only thing
  # that covers a DROPPED PUSH EVENT: 7d90aa9 (a real code merge, 2026-07-19) has ZERO runs of any
  # workflow -- verified via `gh api actions/runs?head_sha=`, and it is the only one of the last 60
  # main commits missing. Nothing was in-flight to cancel it and the next run was a `pull_request`
  # (a different concurrency group), so concurrency cannot explain it and the `cancel-in-progress`
  # change below CANNOT cover it. Unexplained, and recorded as unexplained rather than folded into
  # the concurrency story. A schedule also re-runs the scanners against a drifted vuln DB, which a
  # push-only repo never does.
  schedule:
    - cron: '17 6 * * 1'

# Least privilege: jobs only read the repo.
permissions:
  contents: read

# One in-flight run per ref. Cancel superseded runs on a PR BRANCH (only the tip matters there);
# NEVER on main, where each commit deserves its own verification.
#
# WHY, measured 2026-07-19: with `cancel-in-progress: true` on main, merging code and then a
# docs-only commit minutes later LOSES the code commit's static-check -- the code run is cancelled,
# and the superseding run legitimately SKIPS static-check because ITS OWN diff is docs-only
# (the `changes` filter working as designed). It happened THREE times in one day
# (4fad575, bf82e7f, d0a091a). The immediate, certain benefit is not the re-verification, though:
# it is that every cancelled run leaves main showing `ci-pass: failure` for a NON-failure, which
# trains readers to ignore main's status.
#
# Cost is negligible and was measured, not assumed: docs runs ~50s, code runs 2:46-8:00; not
# cancelling costs roughly 15 extra runner-minutes across 60 commits.
#
# NOTE a SECOND mechanism this does NOT touch: `concurrency.queue` defaults to `single`, so a
# PENDING run is still discarded when a newer one queues. It did not fire in the observed window
# (no third push arrived inside any run), so it is latent. `queue: max` would close it, but the
# docs say `queue: max` + `cancel-in-progress: true` is a validation error, and whether that check
# fires against an EXPRESSION that evaluates true on PRs is UNVERIFIED -- so it is deliberately NOT
# combined here. Test it on a throwaway branch before adding.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  # Which gates does this change actually need? Runner minutes are BILLED, so a docs-only
  # change must not pay for a full Java+Go build.
  #
  # This used to be dorny/paths-filter with a "deny-list" (`'**'` then `'!**/*.md'`), and it
  # DID NOT WORK: paths-filter ORs the globs, so `'**'` matched on its own and the `!` lines
  # subtracted nothing. Every docs-only PR reported `code = true` — with an EMPTY "Matching
  # files:" list, which is the tell — and paid ~2 minutes of billed runner time for a build it
  # did not need. Nothing ever failed, so nothing surfaced it; it just quietly cost money.
  #
  # The decision itself lives in scripts/classify-changes.sh, which has a unit test
  # (make test-scripts) — logic that costs money gets a test. This job only fetches the file
  # list. It keeps the deny-list SEMANTICS that motivated the original (anything that is not
  # pure docs — renovate.json, .trivyignore, a new root config — runs static-check, so no
  # change can slip through with zero gates).
  changes:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      code: ${{ steps.filter.outputs.code }}
      docs: ${{ steps.filter.outputs.docs }}
      diagrams: ${{ steps.filter.outputs.diagrams }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - id: filter
        env:
          GH_TOKEN: ${{ github.token }}
          EVENT: ${{ github.event_name }}
          REPO: ${{ github.repository }}
          PR: ${{ github.event.number }}
          BEFORE: ${{ github.event.before }}
          SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          files=""
          case "$EVENT" in
            pull_request)
              files="$(gh api "repos/${REPO}/pulls/${PR}/files" --paginate --jq '.[].filename')" ;;
            push)
              # A first push / a new branch / a tag has an all-zero `before`: nothing to compare
              # to, so the list stays empty and classify-changes.sh runs every gate.
              case "$BEFORE" in
                ''|0000000000000000000000000000000000000000) files="" ;;
                *) files="$(gh api "repos/${REPO}/compare/${BEFORE}...${SHA}" --jq '.files[].filename')" ;;
              esac ;;
          esac
          printf '%s\n' "$files" | sed '/^$/d; s/^/  changed: /'
          printf '%s\n' "$files" | ./scripts/classify-changes.sh | tee -a "$GITHUB_OUTPUT"

  # Composite code gate: check-env + lint + validate + app-test (Java 25 via mise).
  static-check:
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      # THE toolchain step: mise installs EVERY tool in .mise.toml — java (temurin 25),
      # maven, go, kubectl, helm, kustomize, kind, jq, yq, crane, node, trivy, gitleaks,
      # shellcheck, kubeconform, hadolint, yamllint — and puts them on PATH with
      # JAVA_HOME/GOROOT set. That is the whole point of the version-manager policy:
      # ONE pinned file, no per-language setup step. mise-action caches the installs,
      # so a warm run costs seconds.
      #
      # There is deliberately NO actions/setup-java here. There used to be, from before
      # java was pinned in .mise.toml — and it was pure dead weight: it ran BEFORE this
      # step, so mise's JAVA_HOME overrode its, it installed a second JDK nobody used,
      # and it wrote a toolchains.xml the pom never reads. Its only lasting effect was a
      # SECOND source of truth for the Java major (`java-version: '25'`), which
      # check-java-alignment then had to police. Java comes from .mise.toml. Full stop —
      # and check-java-alignment now FAILS if a java-version pin reappears here.
      #
      # There is ALSO deliberately no bespoke "Install kubeconform, yamllint, hadolint"
      # step. There used to be one: it curl'd two GitHub-release binaries into
      # /usr/local/bin and ran `pipx install yamllint` (UNPINNED) on EVERY run — ~25 s
      # of billed runner time, uncached, and a second source of truth for two tool pins
      # that only CI could see (a local `make lint` used whatever the dev box had).
      # All three ARE in mise's registry (kubeconform + hadolint via aqua, yamllint via
      # pipx/uv); they are pinned in .mise.toml and installed by the step above.
      - uses: jdx/mise-action@f10502fc09dadecfefb962fff68ce77213930204 # v4

      # Persist kubeconform's downloaded JSON schemas across runs (validate.sh
      # points kubeconform -cache here) so githubusercontent isn't re-hit every run.
      - name: Cache kubeconform schemas
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
        with:
          path: ~/.cache/kubeconform
          key: kubeconform-schemas-v1

      # Persist the Maven local repo across runs — static-check runs mvn twice (app-test's `mvnw test`
      # AND, via sec→trivy-fs→app-build, `mvnw package`), and both cold-download the whole Spring Boot
      # dependency tree. Cache `~/.m2` (not just `repository/`) so it also grabs the ~9.6 MB Maven
      # distribution the only-script `mvnw` downloads into `~/.m2/wrapper/dists/`. Key = pom hash, so a
      # BOM/parent/dependency bump busts it and mvn re-resolves the delta from Central — a warm cache
      # cannot mask an unresolvable dep (the poms pin exact versions; no ranges/SNAPSHOTs).
      # (Reviewed by java-adversary + docker-adversary 2026-07-14: the trivy-DB cache was DROPPED — it
      # would silently serve a DB up to trivy's 24h client interval, missing same-day CVEs, for ~10s;
      # and the job-split was skipped as marginal ROI + a ruleset-rename risk.)
      - name: Cache Maven ~/.m2 (deps + mvnw-downloaded Maven)
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
        with:
          path: ~/.m2
          key: maven-${{ hashFiles('apps/**/pom.xml') }}
          restore-keys: maven-

      - name: make static-check
        run: make static-check

  # Docs gate: markdownlint (via npx) + the README-scenario gate. CHEAP — no Docker.
  docs-lint:
    needs: changes
    if: needs.changes.outputs.docs == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      # Node so `npx markdownlint-cli` works.
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: '24'

      - name: make docs-lint
        run: make docs-lint

  # Diagram drift gate — SEPARATE from docs-lint because it is FAR more expensive: it `docker run`s
  # the pinned PlantUML image (~478 MB cold) and re-renders every .puml to byte-compare it against
  # the committed PNG. It used to be an unconditional prerequisite of docs-lint, so every README-only
  # PR paid for a render of seven diagrams it never touched. It now runs only when a diagram source,
  # a committed PNG, or the renderer pin (PLANTUML_VERSION, in the Makefile) actually changed.
  diagrams-check:
    needs: changes
    if: needs.changes.outputs.diagrams == 'true'
    runs-on: ubuntu-latest
    # podman is the local default; on the runner use docker for the diagram render
    # (rootless-podman keep-id isn't guaranteed configured on the runner).
    env:
      CONTAINER_ENGINE: docker
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: make diagrams-check
        run: make diagrams-check

  # Secret scanning guards *.md as much as it guards code — so it must NOT hang off `code == true`.
  #
  # It used to live only in `sec` -> `static-check`, which runs `if: code == 'true'`. A DOCS-ONLY PR
  # classifies as code=false/docs=true, so static-check is SKIPPED — and a docs-only PR is the ONLY
  # shape that can introduce a prose credential into a runbook, which is precisely what
  # `prose-secrets` exists to catch (gitleaks misses natural-language secrets). The gate was
  # unreachable from the one PR shape it was written for. Proven: a planted `admin / <random>` line
  # in a .md fails scripts/check-prose-secrets.sh (rc=1) while `make docs-lint` — the only gate that
  # PR ran — exits 0.
  #
  # Deliberately NO `if:` — every changed path classifies as code or docs (and an empty list forces
  # both true), so `code || docs` is a tautology. Running unconditionally makes the SECURITY gate
  # structurally immune to a future classifier bug, and the classifier has already been wrong once
  # (the dorny/paths-filter deny-list, see scripts/classify-changes.sh).
  secrets:
    runs-on: ubuntu-latest
    steps:
      # fetch-depth: 1 is LOAD-BEARING for gitleaks. `gitleaks detect` scans git HISTORY, not the
      # working tree; with a shallow checkout the single root commit has no parent, so it is diffed
      # against the empty tree — i.e. the whole worktree is scanned as additions. `fetch-depth: 0`
      # (which gitleaks' own docs suggest) would silently turn this into a history-only scan of a
      # history that is already clean: a gate that passes by not looking. Do not "fix" this.
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      # Only gitleaks — still pinned by .mise.toml (one source of truth), but without dragging in
      # the JDK/Go/kubectl/helm toolchain that static-check needs. cache:false so we don't restore
      # (or save) that job's much larger cache just to obtain one Go binary.
      - uses: jdx/mise-action@f10502fc09dadecfefb962fff68ce77213930204 # v4
        with:
          install_args: gitleaks
          cache: false

      - name: make secrets-scan
        run: make secrets-scan

  # Single required status check: fails if any needed job failed/cancelled,
  # passes if they succeeded or were legitimately skipped by paths-filter.
  ci-pass:
    needs: [changes, static-check, docs-lint, diagrams-check, secrets]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Verify required jobs
        # Inspect the changes detector too: if `changes` itself fails/cancels, the
        # gate jobs are skipped (result 'skipped', not 'failure'), so a check that
        # only looked at static-check/docs-lint would go green with no gates run.
        run: |
          if ${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}; then
            echo "a required job failed or was cancelled"; exit 1
          fi
          echo "ci-pass: OK"
