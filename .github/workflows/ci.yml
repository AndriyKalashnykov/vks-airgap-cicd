name: CI

# Offline-verifiable gates for the air-gapped VKS CI/CD demo.
# Flow: changes → (static-check, docs-lint) → ci-pass (single required check).
on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
  workflow_dispatch:

# Least privilege: jobs only read the repo.
permissions:
  contents: read

# One in-flight run per ref; newer pushes cancel older runs.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Detect which parts of the tree changed, to skip irrelevant gates.
  changes:
    runs-on: ubuntu-latest
    # paths-filter reads the PR's changed files via the API on pull_request events.
    permissions:
      contents: read
      pull-requests: read
    outputs:
      code: ${{ steps.filter.outputs.code }}
      docs: ${{ steps.filter.outputs.docs }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4
        id: filter
        with:
          # `base` set only on push so paths-filter works under `act push`;
          # left empty on pull_request (where it is ignored — avoids the annotation).
          base: ${{ github.event_name == 'push' && github.ref_name || '' }}
          # `code` is a DENY-list: everything that is NOT pure docs. An allow-list
          # would let a root-config-only PR (e.g. renovate.json, .trivyignore) match
          # neither filter -> static-check AND docs-lint both skip -> ci-pass green
          # with zero gates run. The deny-list makes any non-docs change run static-check.
          filters: |
            code:
              - '**'
              - '!**/*.md'
              - '!docs/**'
            docs:
              - '**/*.md'
              - 'docs/**'

  # Composite code gate: check-env + lint + validate + app-test (Java 21 via mise).
  static-check:
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      # JDK 21 with JAVA_HOME set (the app targets Java 21; ./mvnw honors JAVA_HOME,
      # and the runner's default is older). Provides Maven via the ./mvnw wrapper.
      - uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5
        with:
          distribution: temurin
          java-version: '21'

      # Installs the rest of the .mise.toml toolchain (kubectl/kustomize/jq/yq/...).
      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4

      # Tools mise does not provide (shellcheck + Docker are preinstalled on the runner).
      - name: Install kubeconform, yamllint, hadolint
        env:
          # renovate: datasource=github-releases depName=yannh/kubeconform
          KUBECONFORM_VERSION: v0.6.7
          # renovate: datasource=github-releases depName=hadolint/hadolint
          HADOLINT_VERSION: v2.14.0
        run: |
          set -euo pipefail
          curl -sSfL \
            "https://github.com/yannh/kubeconform/releases/download/${KUBECONFORM_VERSION}/kubeconform-linux-amd64.tar.gz" \
            | sudo tar -xz -C /usr/local/bin kubeconform
          sudo curl -sSfL \
            "https://github.com/hadolint/hadolint/releases/download/${HADOLINT_VERSION}/hadolint-Linux-x86_64" \
            -o /usr/local/bin/hadolint
          sudo chmod +x /usr/local/bin/hadolint
          pipx install yamllint
          kubeconform -v && hadolint --version && yamllint --version

      # Persist kubeconform's downloaded JSON schemas across runs (validate.sh
      # points kubeconform -cache here) so githubusercontent isn't re-hit every run.
      - name: Cache kubeconform schemas
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
        with:
          path: ~/.cache/kubeconform
          key: kubeconform-schemas-v1

      - name: make static-check
        run: make static-check

  # Docs gate: diagrams drift-check (PlantUML via Docker) + markdownlint (via npx).
  docs-lint:
    needs: changes
    if: needs.changes.outputs.docs == 'true'
    runs-on: ubuntu-latest
    # podman is the local default; on the runner use docker for the diagram render
    # (rootless-podman keep-id isn't guaranteed configured on the runner).
    env:
      CONTAINER_ENGINE: docker
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      # Node so `npx markdownlint-cli` works (Docker is preinstalled for diagrams-check).
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '24'

      - name: make docs-lint
        run: make docs-lint

  # Single required status check: fails if any needed job failed/cancelled,
  # passes if they succeeded or were legitimately skipped by paths-filter.
  ci-pass:
    needs: [changes, static-check, docs-lint]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Verify required jobs
        # Inspect the changes detector too: if `changes` itself fails/cancels, the
        # gate jobs are skipped (result 'skipped', not 'failure'), so a check that
        # only looked at static-check/docs-lint would go green with no gates run.
        run: |
          if ${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}; then
            echo "a required job failed or was cancelled"; exit 1
          fi
          echo "ci-pass: OK"
