apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ${ARGOCD_APP_NAME}
  namespace: ${ARGOCD_NAMESPACE}
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    # In-cluster Gitea URL (ArgoCD resolves it via kube-DNS). Kustomize app at root.
    repoURL: ${DEPLOY_REPO_CLONE_URL}
    targetRevision: ${ARGOCD_TRACK_BRANCH}
    path: .
  destination:
    server: https://kubernetes.default.svc
    namespace: ${ARGOCD_DEST_NAMESPACE}
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
